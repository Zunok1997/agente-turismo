name: Newsletter Turismo Semanal

on:
  schedule:
    # Lunes 8:00 AM Chile — invierno CLT (UTC-4): 12:00 UTC
    - cron: '0 12 * * 1'
    # Lunes 8:00 AM Chile — verano CLST (UTC-3): 11:00 UTC
    - cron: '0 11 * * 1'
  workflow_dispatch:  # Ejecución manual desde GitHub UI

jobs:
  generar-newsletter:
    runs-on: ubuntu-latest
    # Evitar que los dos crons se solapen
    concurrency:
      group: turismo-newsletter
      cancel-in-progress: false

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar newsletter de turismo
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
        run: python main.py

      - name: Publicar newsletter (GitHub Pages)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "newsletter turismo — $(date -u +'%Y-%m-%d')"
          git push
