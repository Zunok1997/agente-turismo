name: Newsletter Turismo Semanal

on:
  schedule:
    # Lunes 8:00 AM Chile — invierno CLT (UTC-4): 12:00 UTC
    - cron: '0 12 * * 1'
    # Lunes 8:00 AM Chile — verano CLST (UTC-3): 11:00 UTC
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  generar-newsletter:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    concurrency:
      group: turismo-newsletter
      cancel-in-progress: false

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar newsletter de turismo
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
          PAGES_URL:          https://zunok1997.github.io/agente-turismo/
        run: python main.py

      - name: Publicar en GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch docs/.nojekyll
          git add docs/index.html docs/.nojekyll
          git diff --cached --quiet || git commit -m "Newsletter turismo $(date +%Y-%m-%d)"
          git push

permissions:
  contents: write
